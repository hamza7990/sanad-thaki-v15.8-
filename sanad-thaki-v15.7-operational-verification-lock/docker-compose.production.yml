services:
  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DISABLE_INVOICE_QUEUE_WORKER: "true"
      DISABLE_COMMERCIAL_MAINTENANCE: "true"
      WORKER_ONLY: "false"
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='X-Forwarded-Proto: https' http://127.0.0.1:3000/health/ready >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks:
      - sanad_prod
    security_opt:
      - no-new-privileges:true

  worker:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      WORKER_ONLY: "true"
      DISABLE_INVOICE_QUEUE_WORKER: "false"
      DISABLE_COMMERCIAL_MAINTENANCE: "false"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["sh", "-c", "node scripts/production-preflight.mjs && npm start"]
    networks:
      - sanad_prod
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD:?REDIS_PASSWORD is required}\""]
    env_file:
      - .env.production
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sanad_prod
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sanad_prod
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: REPLACE_WITH_STRONG_DB_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sanad_prod

networks:
  sanad_prod:
    driver: bridge

volumes:
  redis_data:
  caddy_data:
  caddy_config:
  postgres_data:
