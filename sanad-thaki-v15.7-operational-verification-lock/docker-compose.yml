services:
  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DISABLE_INVOICE_QUEUE_WORKER: "true"
      DISABLE_COMMERCIAL_MAINTENANCE: "true"
      WORKER_ONLY: "false"
      LOCAL_TENANT_SECRET_DIR: "/tmp/tenant-secrets"
    volumes:
      - tenant_secrets:/tmp/tenant-secrets
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='X-Forwarded-Proto: https' http://127.0.0.1:3000/health/ready >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks:
      - sanad_net

  worker:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKER_ONLY: "true"
      DISABLE_INVOICE_QUEUE_WORKER: "false"
      DISABLE_COMMERCIAL_MAINTENANCE: "false"
      LOCAL_TENANT_SECRET_DIR: "/tmp/tenant-secrets"
    volumes:
      - tenant_secrets:/tmp/tenant-secrets
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["sh", "-c", "node scripts/production-preflight.mjs && npm start"]
    networks:
      - sanad_net

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD:?REDIS_PASSWORD is required}\""]
    env_file:
      - .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sanad_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/sanad.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sanad_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sanad_net

networks:
  sanad_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  tenant_secrets:

