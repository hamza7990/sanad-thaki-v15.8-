services:
  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sanad_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/sanad.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - sanad_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sanad_thaki
      POSTGRES_USER: sanad_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanad_app -d sanad_thaki"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sanad_net

networks:
  sanad_net:
    driver: bridge

volumes:
  postgres_data:
